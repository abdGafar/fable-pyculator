name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with quality dependencies
        run: python -m pip install -e ".[quality]"

      - name: Run lint checks
        run: python -m ruff check .

  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with test dependencies
        run: python -m pip install -e ".[test,notebook,docs]"

      - name: Run tests
        run: python -m pytest

      - name: Build docs
        run: sphinx-build -b html docs _build/html -W

  release-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[release]"

      - name: Build and inspect release artifacts
        env:
          PYTHON: python
          RELEASE_CHECK_DIR: tmp/release-checks/ci
        run: scripts/check_release_artifacts.sh
